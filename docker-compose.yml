version: "3.9"

services:

  cache:
    image: redis:7
    ports:
      - "6379:6379"

  response-generator:
    build: ./generador_respuestas
    ports:
      - "5000:5000"

  traffic-generator:
    build: ./generador_trafico
    depends_on:
      - response-generator

  metrics:
    build: ./almacenamiento_metricas
    ports:
      - "6000:6000"